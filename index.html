<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportPulse — Аналітична платформа для спортивних вболівальників</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0b0f;
            --bg-secondary: #12131a;
            --bg-card: #1a1b25;
            --bg-card-hover: #22232f;
            --accent: #00e676;
            --accent-dim: rgba(0, 230, 118, 0.15);
            --accent-secondary: #00bfa5;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --border: #2a2b3a;
            --gradient-1: linear-gradient(135deg, #00e676, #00bfa5);
            --gradient-2: linear-gradient(135deg, #00e676, #1de9b6, #00bfa5);
            --gradient-hero: linear-gradient(180deg, #0a0b0f 0%, #0d1520 50%, #0a0b0f 100%);
            --shadow-glow: 0 0 40px rgba(0, 230, 118, 0.2);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            background: rgba(10, 11, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            padding: 0.7rem 2rem;
            background: rgba(10, 11, 15, 0.95);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--text-primary);
        }

        .nav-logo-icon {
            width: 36px;
            height: 36px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .nav-cta {
            background: var(--gradient-1);
            color: #0a0b0f !important;
            padding: 0.55rem 1.4rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: transform 0.3s, box-shadow 0.3s !important;
        }

        .nav-cta:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-glow);
        }

        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .nav-hamburger span {
            width: 26px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: 0.3s;
        }

        /* ========== HERO ========== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 8rem 2rem 4rem;
            background: var(--gradient-hero);
            overflow: hidden;
        }

        .hero-bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 230, 118, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 230, 118, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        .hero-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .hero-orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(0, 230, 118, 0.15);
            top: -10%;
            right: -5%;
            animation-delay: 0s;
        }

        .hero-orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(0, 191, 165, 0.12);
            bottom: -10%;
            left: -5%;
            animation-delay: -4s;
        }

        .hero-orb-3 {
            width: 250px;
            height: 250px;
            background: rgba(29, 233, 182, 0.1);
            top: 40%;
            left: 30%;
            animation-delay: -2s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .hero-content {
            max-width: 900px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent
